# =============================================================================
# cnv_etl configuration
# =============================================================================


# -----------------------------------------------------------------------------
# Pipeline
# -----------------------------------------------------------------------------

[pipeline]
date_from = "2025-01-01"
date_to   = "2026-03-01"

exclude_keywords = [
    "RELAC.: CONTROLADA",
    "RELAC.: CONTROLANTE",
    "RELAC.: VINCULADA",
    "NORMA CONTABLE: NCP",
    "BALANCE SUBSIDIARIA",
    "OTROS IDIOMAS",
]


# -----------------------------------------------------------------------------
# Scraping — URLs and XPath selectors
# -----------------------------------------------------------------------------

[scraping]
base_url = "https://www.cnv.gov.ar/SitioWeb/Empresas/"

# Delays (seconds) - tune these if the CNV site becomes slower
click_delay    = 0.1   # pause after wait_clickable before returning
tab_delay      = 0.5   # pause after switching tabs in parsers
page_delay     = 0.5   # pause after paginating statement values

[scraping.xpaths]
financial_info_menu    = "//a[contains(., 'Información Financiera')]"
financial_states_menu  = "//a[contains(., 'Estados Contables')]"
panel_heading          = "//div[@class='panel-heading']//strong[text()='Estados Contables']"
statement_main_tab     = "//a[contains(., 'Estados Contables Básicos y Principales Índices')]"
statement_metadata_tab = "//a[contains(., 'Identificación del Balance')]"
company_metadata_tab   = "//a[contains(., 'Otros Datos')]"

# -----------------------------------------------------------------------------
# Parsing — CNV element IDs
# -----------------------------------------------------------------------------

[parsing.statement_metadata_ids]
reporting_period             = "1select18889"
period_end_date              = "1date17466"
financial_statements_type    = "1select36921"
presentation_currency        = "1select22363"
unit_of_measure              = "1select111599"
accounting_standards_applied = "1select34258"

[parsing.company_metadata_ids]
merger_or_demerger_in_process          = "1select99591"
treasury_shares                        = "1select21271"
insolvency_proceedings                 = "1select18901"
public_offering_of_equity_instruments  = "1select496788"
subscribed_shares_at_period_end        = "1decimal21466"
equity_share_price_at_period_end       = "1decimal61378"
price_earnings_ratio                   = "1decimal42743"
market_capitalization                  = "1decimal17252"
free_float_percentage                  = "1decimal46286"
number_of_employees                    = ["1textbox16696", "1decimal20806"]


# -----------------------------------------------------------------------------
# Transformers — mapping tables
# -----------------------------------------------------------------------------

[transformers.units]
"Unit"         = 1
"$"            = 1
"Thousands"    = 1_000
"Miles de $"   = 1_000
"Millions"     = 1_000_000
"Millones de $" = 1_000_000

[transformers.boolean]
true_values  = ["Si", "Sí"]
false_values = ["No"]

[transformers.reporting_period]
"ANUAL"      = "Annual"
"1"          = "Annual"
"SEMESTRAL"  = "Semester"
"2"          = "Semester"
"TRIMESTRAL" = "Quarter"
"3"          = "Quarter"
"IRREGULAR"  = "Irregular"

[transformers.statement_type]
"INDIVIDUAL"   = "Separate"
"CONSOLIDADO"  = "Consolidated"

[transformers.accounting_standard]
"NIIF"                        = "IFRS"
"RT"                          = "Argentine GAAP (RT)"
"NORMAS CONTABLES PROFESIONALES" = "Argentine GAAP"

[transformers.taxonomy]
"EFECTIVO Y EQUIVALENTES A EFECTIVO"                                               = "CashAndCashEquivalents"
"ACTIVOS FINANCIEROS CORRIENTES"                                                   = "CurrentFinancialAssets"
